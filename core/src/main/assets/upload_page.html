<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Send App to TV - Universal Installer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.05);
            --primary: #4F46E5;
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 90%;
            max-width: 480px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .container:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }
        .icon {
            width: 72px;
            height: 72px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .icon img { width: 100%; height: 100%; object-fit: contain; }
        h1 { font-size: 28px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.5px; }
        p.subtitle { color: var(--text-muted); font-size: 15px; margin: 0 0 32px; line-height: 1.5; }
        
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 32px 20px;
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
        }
        .upload-area input[type=file] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }
        .upload-area .upload-icon {
            margin-bottom: 12px; opacity: 0.7; transition: transform 0.3s ease;
        }
        .upload-area:hover .upload-icon { transform: translateY(-4px); opacity: 1; }
        .upload-area .upload-text { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .upload-area .upload-hint { font-size: 13px; color: var(--text-muted); }
        .file-info {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 12px;
            margin-top: 24px;
            text-align: left;
        }
        .file-info.active { display: flex; }
        .file-details { flex: 1; overflow: hidden; }
        .file-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .file-size { font-size: 13px; color: var(--text-muted); }
        
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #EC4899);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            margin-top: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transition: all 0.3s ease;
            font-family: inherit;
        }
        button:hover {
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
            transform: translateY(-2px);
        }
        button:disabled {
            background: #374151;
            box-shadow: none;
            cursor: not-allowed;
            color: #9CA3AF;
            transform: none;
        }
        
        .progress-container {
            display: none;
            margin-top: 24px;
        }
        .progress-container.active { display: block; }
        .progress-bar {
            height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--primary), #EC4899);
            width: 0%; transition: width 0.3s ease;
        }
        .progress-text { display: flex; justify-content: space-between; font-size: 13px; margin-top: 8px; color: var(--text-muted); }
        
        .success-state {
            display: none; flex-direction: column; align-items: center;
        }
        .success-state.active { display: flex; }
        .success-icon {
            width: 64px; height: 64px; background: rgba(16, 185, 129, 0.1); border-radius: 50%;
            color: #10B981; display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container" id="mainCard">
        <div class="icon">
            <img src="/logo.png" alt="Logo">
        </div>
        <h1>Send to TV</h1>
        <p class="subtitle">Install an app directly on your TV<br>without typing URLs</p>
        
        <form id="uploadForm">
            <div class="upload-area" id="dropZone">
                <input type="file" id="fileInput" name="apk" accept=".apk,.apks,.xapk,.apkm" required>
                <div class="upload-icon">
                    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                </div>
                <div class="upload-text">Click to select or drag & drop</div>
                <div class="upload-hint">Supports .apk, .apks, .xapk, .apkm files</div>
            </div>
            
            <div class="file-info" id="fileInfo">
                <div class="file-details">
                    <div class="file-name" id="fileName">app.apk</div>
                    <div class="file-size" id="fileSize">10 MB</div>
                </div>
                <svg width="24" height="24" fill="none" stroke="#10B981" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
            </div>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-text"><span id="progressPercent">0%</span><span>Uploading...</span></div>
            </div>
            
            <button type="submit" id="submitBtn" disabled>Send App Now</button>
        </form>
        
        <div class="success-state" id="successState">
            <div class="success-icon">
                <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2>Sent Successfully</h2>
            <p class="subtitle" style="margin-bottom:0">Please confirm the installation on your TV screen.</p>
            <button style="margin-top:24px" onclick="location.reload()">Send Another App</button>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const fileInfo = document.getElementById('fileInfo');
        const submitBtn = document.getElementById('submitBtn');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const successState = document.getElementById('successState');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                e.stopPropagation();
            });
        });
        ['dragenter', 'dragover'].forEach(evt => {
            dropZone.addEventListener(evt, () => dropZone.classList.add('dragover'));
        });
        ['dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, () => dropZone.classList.remove('dragover'));
        });
        dropZone.addEventListener('drop', e => {
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });
        fileInput.addEventListener('change', handleFileSelect);
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024, sizes = ['Bytes', 'KB', 'MB', 'GB'], i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function handleFileSelect() {
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileName.textContent = file.name;
                fileSize.textContent = formatBytes(file.size);
                dropZone.style.display = 'none';
                fileInfo.classList.add('active');
                submitBtn.disabled = false;
            }
        }
        
        form.addEventListener('submit', e => {
            e.preventDefault();
            if (!fileInput.files.length) return;
            
            submitBtn.style.display = 'none';
            progressContainer.classList.add('active');
            
            const xhr = new XMLHttpRequest();
            const formData = new FormData();
            formData.append('apk', fileInput.files[0]);
            
            xhr.upload.addEventListener('progress', e => {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    progressFill.style.width = pct + '%';
                    progressPercent.textContent = pct + '%';
                }
            });
            
            xhr.onload = () => {
                if (xhr.status === 200) {
                    form.style.display = 'none';
                    successState.classList.add('active');
                    document.querySelector('h1').style.display = 'none';
                    document.querySelector('p.subtitle').style.display = 'none';
                    document.querySelector('.icon').style.display = 'none';
                } else {
                    alert('Upload failed: ' + xhr.responseText);
                    submitBtn.style.display = 'block';
                    progressContainer.classList.remove('active');
                }
            };
            xhr.onerror = () => {
                alert('Connection error');
                submitBtn.style.display = 'block';
                progressContainer.classList.remove('active');
            };
            
            xhr.open('POST', '/upload?token={{TOKEN}}', true);
            xhr.send(formData);
        });
    </script>
</body>
</html>
